<script>
// ─── State ───────────────────────────────────────────────────────────────────
const previewCache = {};   // key → { preview, artwork, trackName, artistName } | null
const prefetchQueue = {};  // key → Promise  (prevents duplicate in-flight requests)
var currentItem = null;    // currently playing .song-item element
var audioEl = document.getElementById('mini-player-audio');
var miniPlayer = document.getElementById('mini-player');

// ─── iTunes lookup (HTTPS-forced, JSONP for iOS CORS, fetch fallback) ─────────
function forcehttps(url) {
    return url ? url.replace(/^http:\/\//i, 'https://') : null;
}

function itunesJSONP(title, artist) {
    return new Promise(function(resolve) {
        var cb = 'itcb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
        var timer, script;
        function cleanup() {
            clearTimeout(timer);
            try { delete window[cb]; } catch(e) {}
            if (script && script.parentNode) script.parentNode.removeChild(script);
        }
        window[cb] = function(data) { cleanup(); resolve((data && data.results) || []); };
        timer = setTimeout(function() { cleanup(); resolve([]); }, 7000);
        script = document.createElement('script');
        script.onerror = function() { cleanup(); resolve([]); };
        script.src = 'https://itunes.apple.com/search?term=' +
            encodeURIComponent(title + ' ' + artist) +
            '&entity=song&limit=5&media=music&country=GB&callback=' + cb;
        document.head.appendChild(script);
    });
}

function fetchTrackInfo(title, artist) {
    // Returns a Promise that resolves to info object or null.
    // Deduplicates concurrent calls for the same key.
    var key = title + '\x00' + artist;
    if (previewCache.hasOwnProperty(key)) return Promise.resolve(previewCache[key]);
    if (prefetchQueue[key]) return prefetchQueue[key];

    prefetchQueue[key] = itunesJSONP(title, artist).then(function(results) {
        // Fallback to fetch() for non-iOS environments
        if (!results.length) {
            return fetch('https://itunes.apple.com/search?term=' +
                encodeURIComponent(title + ' ' + artist) +
                '&entity=song&limit=5&media=music&country=GB')
              .then(function(r) { return r.ok ? r.json() : {results:[]}; })
              .then(function(d) { return d.results || []; })
              .catch(function() { return []; });
        }
        return results;
    }).then(function(results) {
        var track = results.find(function(r) { return r.previewUrl; }) || null;
        var info = null;
        if (track) {
            info = {
                // Force HTTPS — mixed-content blocks http:// previews on iOS Safari
                preview: forcehttps(track.previewUrl),
                artwork: forcehttps(
                    (track.artworkUrl100 || track.artworkUrl60 || '')
                        .replace(/\d+x\d+bb/, '300x300bb') || null
                ),
                trackName: track.trackName,
                artistName: track.artistName
            };
        }
        previewCache[key] = info;
        delete prefetchQueue[key];
        return info;
    }).catch(function() {
        previewCache[key] = null;
        delete prefetchQueue[key];
        return null;
    });

    return prefetchQueue[key];
}

// ─── Pre-fetch on touchstart/mouseenter so result is cached by tap-end ────────
// This is the key iOS fix: we kick off the network request the moment the user
// touches the element. By the time they lift their finger (tap-end fires the
// click event), the Promise has resolved and previewCache is populated.
// playSong() can then set audioEl.src SYNCHRONOUSLY inside the gesture handler,
// keeping the iOS audio session alive.
function attachPrefetch(item) {
    function prefetch() {
        fetchTrackInfo(item.dataset.title, item.dataset.artist);
    }
    item.addEventListener('touchstart', prefetch, { passive: true });
    item.addEventListener('mouseenter', prefetch);
}

// ─── Playback helpers ─────────────────────────────────────────────────────────
function setPlayingUI(item, on) {
    if (!item || !document.body.contains(item)) return;
    var icon = item.querySelector('.song-play-icon');
    if (on) {
        item.classList.add('playing');
        if (icon) icon.innerHTML =
            '<div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>';
    } else {
        item.classList.remove('playing', 'loading');
        if (icon) icon.textContent = '\u25B6';
    }
}

function setHint(item, text) {
    var h = item && item.querySelector('.song-preview-hint');
    if (h) h.textContent = text;
}

function stopCurrent() {
    audioEl.pause();
    if (currentItem) { setPlayingUI(currentItem, false); currentItem = null; }
    miniPlayer.classList.remove('visible');
    document.body.classList.remove('player-open');
}

audioEl.addEventListener('ended', stopCurrent);

// ─── playSong — the repaired tap handler ─────────────────────────────────────
function playSong(item, title, artist) {
    var key = title + '\x00' + artist;

    // Toggle off if already playing this track
    if (currentItem === item) { stopCurrent(); return; }

    // Stop whatever was playing
    stopCurrent();

    // Show loading state
    item.classList.add('loading');
    var icon = item.querySelector('.song-play-icon');
    if (icon) icon.textContent = '…';
    currentItem = item;

    var info = previewCache.hasOwnProperty(key) ? previewCache[key] : null;

    function doPlay(info) {
        // Guard: user may have tapped something else while we awaited
        if (currentItem !== item) return;

        if (!info || !info.preview) {
            item.classList.remove('loading');
            setPlayingUI(item, false);
            setHint(item, 'Preview not available');
            currentItem = null;
            return;
        }

        // ── THE iOS FIX ──────────────────────────────────────────────────────
        // We are still inside (or very close to) the original user-gesture call
        // stack because doPlay() is called synchronously from the cache hit path,
        // or via the prefetch-resolved path where the Promise resolved before the
        // click fired. Setting src + calling load() here keeps the audio session
        // open. play() is then called from oncanplay, which iOS permits because
        // it's a media-element event — not a timer or resolved Promise.
        audioEl.src = info.preview;
        audioEl.load();

        function onCanPlay() {
            audioEl.removeEventListener('canplay', onCanPlay);
            if (currentItem !== item) return;
            var p = audioEl.play();
            if (p && p.catch) {
                p.catch(function(err) {
                    // Autoplay still blocked (e.g. low-power mode)?
                    // The native audio controls in mini-player let the user tap play.
                    console.warn('play() blocked:', err.message);
                    setHint(item, 'Tap play in the player below');
                });
            }
        }
        audioEl.addEventListener('canplay', onCanPlay);

        // Update artwork in song row
        var artImg = item.querySelector('.song-artwork');
        var ph = item.querySelector('.song-artwork-placeholder');
        if (artImg && info.artwork) {
            artImg.src = info.artwork;
            artImg.style.display = 'block';
            if (ph) ph.style.display = 'none';
        }

        // Update mini-player
        var mpArt = document.getElementById('mini-player-art');
        if (info.artwork) { mpArt.src = info.artwork; mpArt.style.display = 'block'; }
        else { mpArt.src = ''; mpArt.style.display = 'none'; }
        document.getElementById('mini-player-title').textContent = info.trackName || title;
        document.getElementById('mini-player-artist').textContent = info.artistName || artist;
        miniPlayer.classList.add('visible');
        document.body.classList.add('player-open');

        setPlayingUI(item, true);
        setHint(item, 'Playing preview…');
    }

    if (info !== null) {
        // Cache hit — doPlay synchronously, still within gesture
        doPlay(info);
    } else {
        // Not yet cached — kick off fetch (may already be in flight from prefetch)
        fetchTrackInfo(title, artist).then(doPlay);
        // Note: on iOS, if the Promise wasn't pre-resolved by touchstart prefetch,
        // play() may still be blocked. The mini-player controls let the user
        // manually start playback in that case. This is the best we can do
        // without a server-side proxy.
    }
}

// ─── closePlayer (called by the × button) ────────────────────────────────────
function closePlayer() { stopCurrent(); }

// ─── generatePlaylist — rebuild result-box and attach listeners ───────────────
// (songDatabase, moodData, scienceText stay exactly as they were)

function generatePlaylist() {
    var goal = document.getElementById('goal').value;
    var task = document.getElementById('task').value;
    var lyr  = document.getElementById('lyrics').value;
    var rb   = document.getElementById('result-box');

    closePlayer();
    rb.classList.remove('empty');

    var pool = lyr === 'no'
        ? songDatabase[goal].instrumental
        : songDatabase[goal].instrumental.slice(0,3).concat(songDatabase[goal].lyrics.slice(0,5));

    var shuffled = pool.slice().sort(function() { return 0.5 - Math.random(); }).slice(0, 6);
    var md = moodData[goal];

    var html = '<div class="playlist-header">' + md.emoji + ' ' + md.title + '</div>';
    html += '<div class="playlist-description">' + md.desc + '</div>';
    html += '<p style="color:#6366f1;font-size:clamp(0.82rem,2.5vw,0.9rem);margin-bottom:0.8rem;">&#127925; Tap any song to hear a 30-second preview</p>';
    html += '<div class="song-list">';

    shuffled.forEach(function(song, i) {
        // Safe attribute encoding — no apostrophe/quote issues
        var safeTitle  = song.title.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        var safeArtist = song.artist.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
        html += '<div class="song-item" data-title="' + safeTitle + '" data-artist="' + safeArtist + '">';
        html += '<div class="song-artwork-placeholder">&#127925;</div>';
        html += '<img class="song-artwork" src="" alt="">';
        html += '<div class="song-info">';
        html += '<div class="song-title">' + (i+1) + '. ' + song.title + '</div>';
        html += '<div class="song-artist">' + song.artist + ' &middot; ' + song.genre + '</div>';
        html += '<div class="song-preview-hint">Tap to preview</div>';
        html += '</div><div class="song-play-icon">&#9654;</div></div>';
    });

    html += '</div>';
    html += '<div class="science-box"><h3>&#129504; Why this works for '
         + task.charAt(0).toUpperCase() + task.slice(1)
         + '</h3><p>' + scienceText[task] + '</p></div>';

    rb.innerHTML = html;

    rb.querySelectorAll('.song-item').forEach(function(item) {
        attachPrefetch(item);   // start fetching on first touch/hover
        item.addEventListener('click', function() {
            playSong(item, item.dataset.title, item.dataset.artist);
        });
    });

    rb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
