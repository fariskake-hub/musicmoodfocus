<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Music Playlist Generator</title>

<style>
body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:linear-gradient(135deg,#0f172a,#1e293b,#312e81); color:#e5e7eb; margin:0; }

nav { background:rgba(30,41,59,0.95); margin-bottom:0; }

#playlist-hero {
text-align:center;
padding:clamp(2rem,6vw,5rem) clamp(1rem,3vw,2rem);
background:linear-gradient(135deg,#6366f1,#8b5cf6);
border-radius:16px;
margin:1rem;
box-shadow:0 8px 20px rgba(99,102,241,0.3);
}

section { max-width:1000px; margin:2rem auto; padding:0 1rem; }

form { background:rgba(30,41,59,0.95); padding:2rem; border-radius:16px; }

label { display:block; margin-top:1rem; color:#cbd5e1; font-weight:600; }

select { width:100%; padding:0.8rem; margin-top:0.3rem; background:#0f172a; color:#fff; border-radius:8px; }

.gen-btn {
width:100%;
margin-top:1.5rem;
padding:1rem;
border:none;
border-radius:999px;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:#fff;
font-size:1.1rem;
font-weight:600;
cursor:pointer;
}

#result-box {
background:rgba(30,41,59,0.95);
padding:2rem;
border-radius:16px;
margin-top:2rem;
min-height:80px;
}

.song-item {
display:flex;
align-items:center;
gap:1rem;
padding:1rem;
margin:0.7rem 0;
background:rgba(15,23,42,0.95);
border-left:4px solid #6366f1;
border-radius:8px;
cursor:pointer;
}

.song-artwork-placeholder {
width:48px;
height:48px;
border-radius:6px;
background:rgba(99,102,241,0.2);
display:flex;
align-items:center;
justify-content:center;
}

.song-info { flex:1; }

.song-title { font-weight:600; color:#f8fafc; }

.song-artist { color:#94a3b8; font-size:0.9rem; }

.song-play-icon { font-size:1.3rem; }

#mini-player {
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(15,23,42,0.97);
border-top:2px solid #6366f1;
padding:10px;
display:none;
align-items:center;
gap:10px;
z-index:999;
}

#mini-player.visible { display:flex; }

#mini-player-art { width:40px; height:40px; border-radius:6px; }

</style>
</head>

<body>

<section id="playlist-hero">
<h1>Customised Playlists</h1>
<p>Answer a few questions and receive a playlist designed using psychological research.</p>
</section>

<section>
<form id="playlistForm">

<label>Goal</label>
<select id="goal">
<option value="focus">Focus</option>
<option value="relax">Relax</option>
<option value="happy">Happy</option>
<option value="energy">Energy</option>
</select>

<label>Task</label>
<select id="task">
<option value="studying">Studying</option>
<option value="working">Working</option>
<option value="exercising">Exercising</option>
<option value="relaxing">Relaxing</option>
</select>

<label>Lyrics</label>
<select id="lyrics">
<option value="no">Instrumental</option>
<option value="yes">Lyrics OK</option>
</select>

<button type="button" class="gen-btn" onclick="generatePlaylist()">▶ Generate My Playlist</button>

</form>

<div id="result-box">Tap generate to see playlist</div>
</section>

<div id="mini-player">
<img id="mini-player-art">
<div>
<div id="mini-player-title"></div>
<div id="mini-player-artist"></div>
</div>
<audio id="mini-player-audio" controls></audio>
<button onclick="closePlayer()">✕</button>
</div>

<script>

/* ================= EXACT ORIGINAL COUNTS RESTORED ================= */

const songDatabase = {

focus:{
instrumental:[
{title:"Moonlight Sonata",artist:"Beethoven"},
{title:"Clair de Lune",artist:"Debussy"},
{title:"Gymnopedie No. 1",artist:"Erik Satie"},
{title:"River Flows in You",artist:"Yiruma"},
{title:"Experience",artist:"Ludovico Einaudi"},
{title:"Weightless",artist:"Marconi Union"},
{title:"Divenire",artist:"Ludovico Einaudi"}
], // 7 songs

lyrics:[
{title:"Lost in Yesterday",artist:"Tame Impala"},
{title:"Float On",artist:"Modest Mouse"},
{title:"Holocene",artist:"Bon Iver"}
] // 3 songs
},

relax:{
instrumental:[
{title:"Weightless",artist:"Marconi Union"},
{title:"Clair de Lune",artist:"Debussy"},
{title:"River Flows in You",artist:"Yiruma"},
{title:"Gymnopedie No. 1",artist:"Erik Satie"},
{title:"Divenire",artist:"Ludovico Einaudi"}
], // 5 songs

lyrics:[
{title:"Banana Pancakes",artist:"Jack Johnson"},
{title:"Come Away With Me",artist:"Norah Jones"},
{title:"Holocene",artist:"Bon Iver"},
{title:"The Night We Met",artist:"Lord Huron"}
] // 4 songs
},

happy:{
instrumental:[
{title:"Take Five",artist:"Dave Brubeck"},
{title:"Sing Sing Sing",artist:"Benny Goodman"}
], // 2 songs

lyrics:[
{title:"Good Life",artist:"OneRepublic"},
{title:"Walking on Sunshine",artist:"Katrina and The Waves"},
{title:"Happy",artist:"Pharrell Williams"},
{title:"Mr Blue Sky",artist:"Electric Light Orchestra"},
{title:"September",artist:"Earth Wind and Fire"},
{title:"Don't Stop Me Now",artist:"Queen"}
] // 6 songs
},

energy:{
instrumental:[
{title:"Sandstorm",artist:"Darude"},
{title:"Animals",artist:"Martin Garrix"}
], // 2 songs

lyrics:[
{title:"Till I Collapse",artist:"Eminem"},
{title:"Eye of the Tiger",artist:"Survivor"},
{title:"Thunderstruck",artist:"AC/DC"},
{title:"Lose Yourself",artist:"Eminem"},
{title:"Levels",artist:"Avicii"},
{title:"Can't Hold Us",artist:"Macklemore"}
] // 6 songs
}
};

/* ================= AUDIO + API (UNCHANGED WORKING LOGIC) ================= */

let audio=document.getElementById("mini-player-audio");
let currentEl=null;
let cache={};
let unlocked=false;

function unlockAudio(){
if(unlocked) return;
unlocked=true;
audio.play().catch(()=>{});
audio.pause();
audio.src="";
}

document.addEventListener("click",unlockAudio,{once:true});
document.addEventListener("touchstart",unlockAudio,{once:true});

/* ---------- iTunes API ---------- */

function itunesSearch(title,artist){
return new Promise(resolve=>{
let cb="cb_"+Date.now();

window[cb]=function(data){
delete window[cb];
script.remove();
resolve(data.results||[]);
};

let script=document.createElement("script");
script.src="https://itunes.apple.com/search?term="+encodeURIComponent(title+" "+artist)+"&entity=song&limit=5&callback="+cb;

script.onerror=()=>resolve([]);
document.body.appendChild(script);

setTimeout(()=>resolve([]),5000);
});
}

async function getPreview(title,artist){
let key=title+artist;
if(cache[key]) return cache[key];

let results=await itunesSearch(title,artist);
let track=results.find(r=>r.previewUrl);

if(!track) return cache[key]=null;

let data={
preview:track.previewUrl,
art:track.artworkUrl100?.replace("100x100bb","300x300bb"),
title:track.trackName,
artist:track.artistName
};

cache[key]=data;
return data;
}

/* ---------- PLAY ---------- */

async function playSong(el,title,artist){

unlockAudio();

if(currentEl===el){
audio.pause();
currentEl=null;
document.getElementById("mini-player").classList.remove("visible");
return;
}

if(currentEl) audio.pause();
currentEl=el;

let info=await getPreview(title,artist);
if(!info) return;

audio.src=info.preview;
audio.load();
audio.play().catch(()=>{});

document.getElementById("mini-player").classList.add("visible");
document.getElementById("mini-player-art").src=info.art||"";
document.getElementById("mini-player-title").textContent=info.title;
document.getElementById("mini-player-artist").textContent=info.artist;
}

/* ---------- GENERATE ---------- */

function generatePlaylist(){

let goal=document.getElementById("goal").value;
let lyrics=document.getElementById("lyrics").value;

let songs=songDatabase[goal].instrumental.slice();

if(lyrics==="yes"){
songs=songs.concat(songDatabase[goal].lyrics);
}

songs=songs.sort(()=>Math.random()-0.5).slice(0,6);

let html="";

songs.forEach(s=>{
html+=`
<div class="song-item" onclick="playSong(this,'${s.title}','${s.artist}')">
<div class="song-artwork-placeholder">🎵</div>
<div class="song-info">
<div class="song-title">${s.title}</div>
<div class="song-artist">${s.artist}</div>
</div>
<div class="song-play-icon">▶</div>
</div>`;
});

document.getElementById("result-box").innerHTML=html;
}

function closePlayer(){
audio.pause();
document.getElementById("mini-player").classList.remove("visible");
currentEl=null;
}

window.generatePlaylist=generatePlaylist;
window.playSong=playSong;

</script>

</body>
</html>
